<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
  KUROZ4PH API
</title>

<link
  rel="stylesheet"
  href="/assets/style.css"
/>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
/>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

</head>
<body>

<div
  class="sidebar-overlay"
  id="sidebarOverlay"
></div>

<!-- SIDEBAR -->

<aside
  class="sidebar"
  id="sidebar"
>

  <div class="sidebar-top">

    <h1>
      KUROZ4PH
    </h1>

    <p>
      Backend Engineer
    </p>

  </div>

  <div class="sidebar-menu">

    <button
      class="sidebar-item"
      data-category="all"
    >
      Dashboard
    </button>

    <button
      class="sidebar-item"
      data-category="search"
    >
      Search
    </button>

    <button
      class="sidebar-item"
      data-category="downloader"
    >
      Downloader
    </button>

    <button
      class="sidebar-item"
      data-category="tools"
    >
      Tools
    </button>

    <button
      class="sidebar-item"
      data-category="ai"
    >
      AI APIs
    </button>

  </div>

</aside>

<!-- NAVBAR -->

<header class="navbar">

  <div class="nav-left">

    <button id="menuBtn">
      ☰
    </button>

    <div class="logo">
      KUROZ4PH API
    </div>

  </div>

  <button id="themeToggle">
    ☀
  </button>

</header>

<!-- HERO -->

<section class="hero">

  <div class="hero-box">

    <span>
      PROFESSIONAL API SERVICES
    </span>

    <h1>
      Modern Developer Dashboard
    </h1>

    <p>
      Powerful API infrastructure with
      realtime endpoint explorer,
      interactive tester,
      responsive interface,
      and scalable backend system.
    </p>

  </div>

</section>

<!-- SEARCH -->

<section class="search-section">

  <input
    type="text"
    id="searchInput"
    placeholder="Search endpoint..."
  >

</section>

<!-- STATS -->

<section class="stats">

  <div class="stat-card">

    <span>
      Total APIs
    </span>

    <h2>
      128
    </h2>

  </div>

  <div class="stat-card">

    <span>
      Requests
    </span>

    <h2>
      82K
    </h2>

  </div>

  <div class="stat-card">

    <span>
      Uptime
    </span>

    <h2>
      99.9%
    </h2>

  </div>

</section>

<!-- GRID -->

<section
  class="api-grid"
  id="apiGrid"
></section>

<!-- MODAL -->

<div id="testerModal"></div>

<script src="/assets/tester.js"></script>

</body>
</html>
